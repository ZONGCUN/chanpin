
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>客如云销售知识闯关</title>
<script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4F46E5;--primary-light:#818CF8;--primary-dark:#3730A3;--gold:#F59E0B;--gold-light:#FCD34D;--success:#10B981;--danger:#EF4444;--bg:#0F172A;--bg-card:#1E293B;--bg-card2:#334155;--text:#F8FAFC;--text-sec:#94A3B8;--border:#475569}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:4px;height:4px;background:var(--primary-light);border-radius:50%;opacity:.3;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.3}90%{opacity:.3}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px;min-height:100vh}

/* ===== Login Screen ===== */
.login-screen{display:flex;flex-direction:column;align-items:center;padding-top:60px}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(79,70,229,.4);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.login-title{font-size:24px;font-weight:700;background:linear-gradient(135deg,#fff,var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;text-align:center}
.login-subtitle{font-size:14px;color:var(--text-sec);margin-bottom:32px;text-align:center}
.login-box{width:100%;max-width:320px}
.login-input{width:100%;padding:14px 16px;background:var(--bg-card);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;text-align:center;outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .2s}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-hint{font-size:12px;color:var(--text-sec);text-align:center;margin-top:12px}
.login-dd-info{font-size:13px;color:var(--success);text-align:center;margin-bottom:16px;display:none}

/* ===== User Bar ===== */
.user-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 16px;background:var(--bg-card);border-radius:12px;border:1px solid var(--border)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1}
.user-name{font-size:15px;font-weight:600}
.user-greeting{font-size:12px;color:var(--text-sec)}

/* ===== Home Screen ===== */
.home-screen{display:none;flex-direction:column;align-items:center;padding-top:20px}
.stats-bar{display:flex;gap:12px;width:100%;margin-bottom:20px}
.stat-item{flex:1;background:var(--bg-card);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--border)}
.stat-value{font-size:22px;font-weight:700;color:var(--gold)}
.stat-label{font-size:11px;color:var(--text-sec);margin-top:2px}
.level-section{width:100%;margin-bottom:20px}
.section-title{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:16px;background:var(--primary);border-radius:2px}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.level-card{background:var(--bg-card);border-radius:16px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-light));opacity:0;transition:opacity .3s}
.level-card:active::before{opacity:1}
.level-card.locked{opacity:.5;cursor:not-allowed}
.level-card.cleared{border-color:var(--success)}
.level-card.cleared::before{opacity:1;background:linear-gradient(90deg,var(--success),#34D399)}
.level-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.level-num{font-size:12px;color:var(--primary-light);font-weight:600}
.level-badge{font-size:20px}
.level-name{font-size:15px;font-weight:600;margin-bottom:4px}
.level-desc{font-size:11px;color:var(--text-sec);margin-bottom:8px}
.level-progress{height:4px;background:var(--bg-card2);border-radius:2px;overflow:hidden}
.level-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:2px;transition:width .5s}
.level-card.cleared .level-progress-fill{background:linear-gradient(90deg,var(--success),#34D399)}
.level-status{font-size:11px;color:var(--text-sec);margin-top:4px;text-align:right}
.medal-section{width:100%;margin-bottom:20px}
.medal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.medal-item{background:var(--bg-card);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--border);transition:all .3s}
.medal-item.earned{border-color:var(--gold);background:linear-gradient(135deg,var(--bg-card),rgba(245,158,11,.1))}
.medal-item.locked{opacity:.4;filter:grayscale(1)}
.medal-icon{font-size:28px;margin-bottom:4px}
.medal-name{font-size:10px;color:var(--text-sec)}
.medal-item.earned .medal-name{color:var(--gold)}
.action-btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.rank-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.rank-btn:active{transform:scale(.98)}
.reset-btn{width:100%;background:none;border:1px solid var(--border);color:var(--text-sec);padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer}

/* ===== Quiz Screen ===== */
.quiz-screen{display:none}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.quiz-back{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px}
.quiz-level-name{font-size:16px;font-weight:600}
.quiz-progress-text{font-size:13px;color:var(--text-sec)}
.quiz-progress-bar{height:6px;background:var(--bg-card2);border-radius:3px;margin-bottom:20px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:3px;transition:width .5s ease}
.question-card{background:var(--bg-card);border-radius:16px;padding:20px;border:1px solid var(--border);margin-bottom:16px}
.question-meta{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.q-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.q-tag.type{background:rgba(79,70,229,.2);color:var(--primary-light)}
.q-tag.diff-easy{background:rgba(16,185,129,.2);color:#34D399}
.q-tag.diff-normal{background:rgba(245,158,11,.2);color:#FBBF24}
.q-tag.diff-hard{background:rgba(239,68,68,.2);color:#F87171}
.question-text{font-size:16px;font-weight:500;line-height:1.6}
.options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.option-item{background:var(--bg-card);border:2px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px}
.option-item:active{transform:scale(.98)}
.option-item.selected{border-color:var(--primary);background:rgba(79,70,229,.1)}
.option-item.correct{border-color:var(--success);background:rgba(16,185,129,.1)}
.option-item.wrong{border-color:var(--danger);background:rgba(239,68,68,.1)}
.option-item.show-correct{border-color:var(--success);background:rgba(16,185,129,.1)}
.option-letter{width:24px;height:24px;border-radius:6px;background:var(--bg-card2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;transition:all .2s}
.option-item.selected .option-letter{background:var(--primary);color:#fff}
.option-item.correct .option-letter,.option-item.show-correct .option-letter{background:var(--success);color:#fff}
.option-item.wrong .option-letter{background:var(--danger);color:#fff}
.option-text{font-size:14px;line-height:1.5;padding-top:2px}
.submit-btn,.next-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.submit-btn:not(:disabled):active,.next-btn:active{transform:scale(.98)}
.next-btn{display:none}
.answer-feedback{display:none;padding:12px 16px;border-radius:12px;margin-bottom:12px;font-size:14px;line-height:1.5}
.answer-feedback.correct{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#34D399}
.answer-feedback.wrong{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#F87171}

/* ===== Result Screen ===== */
.result-screen{display:none}
.result-card{background:var(--bg-card);border-radius:20px;padding:32px 24px;text-align:center;border:1px solid var(--border);margin-bottom:20px}
.result-icon{font-size:64px;margin-bottom:16px;animation:bounceIn .6s ease}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-subtitle{font-size:14px;color:var(--text-sec);margin-bottom:20px}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.result-stat{background:var(--bg-card2);border-radius:12px;padding:12px 8px}
.result-stat-value{font-size:20px;font-weight:700;color:var(--gold)}
.result-stat-label{font-size:11px;color:var(--text-sec);margin-top:2px}
.result-stars{font-size:32px;margin-bottom:16px;letter-spacing:4px}
.result-medal{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(252,211,77,.1));border:1px solid rgba(245,158,11,.3);padding:8px 16px;border-radius:20px;font-size:14px;color:var(--gold)}
.result-actions{display:flex;flex-direction:column;gap:10px}
.result-actions button{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.result-actions button:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.btn-secondary{background:var(--bg-card2);color:var(--text);border:1px solid var(--border)!important}

/* ===== Confetti ===== */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotateZ(0) rotateX(0);opacity:1}100%{transform:translateY(100vh) rotateZ(720deg) rotateX(360deg);opacity:0}}

/* ===== Modal ===== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-content{background:var(--bg-card);border-radius:20px;padding:24px;max-width:400px;width:100%;border:1px solid var(--border);max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-close{width:100%;padding:12px;background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;cursor:pointer;margin-top:16px}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);padding:12px 20px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{border-color:var(--success);color:#34D399}
.toast.error{border-color:var(--danger);color:#F87171}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.shake{animation:shake .5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="toast" id="toast"></div>

<!-- LOGIN SCREEN -->
<div class="container">
  <div class="login-screen" id="loginScreen">
    <div class="login-logo">🏆</div>
    <div class="login-title">客如云知识闯关</div>
    <div class="login-subtitle">销售精英修炼之路</div>
    <div class="login-dd-info" id="ddInfo"></div>
    <div class="login-box">
      <input class="login-input" id="nameInput" type="text" placeholder="请输入你的姓名" maxlength="10" autocomplete="off">
      <button class="login-btn" id="loginBtn" onclick="doLogin()">开始闯关 →</button>
      <div class="login-hint">输入姓名后开始挑战，成绩将记录在钉钉群中</div>
    </div>
  </div>
</div>

<!-- HOME SCREEN -->
<div class="container">
  <div class="home-screen" id="homeScreen">
    <div class="user-bar">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">加载中</div>
        <div class="user-greeting">加油，今天也要努力闯关哦！</div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-value" id="totalCorrect">0</div><div class="stat-label">答对总数</div></div>
      <div class="stat-item"><div class="stat-value" id="totalLevels">0</div><div class="stat-label">已通关</div></div>
      <div class="stat-item"><div class="stat-value" id="totalMedals">0</div><div class="stat-label">已获勋章</div></div>
    </div>
    <div class="level-section">
      <div class="section-title">闯关地图</div>
      <div class="level-grid" id="levelGrid"></div>
    </div>
    <div class="medal-section">
      <div class="section-title">勋章收藏</div>
      <div class="medal-grid" id="medalGrid"></div>
    </div>
    <div class="action-btns">
      <button class="rank-btn" onclick="showWrongBook()">📖 错题回顾</button>
      <button class="reset-btn" onclick="resetProgress()">重置所有进度</button>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="container">
  <div class="quiz-screen" id="quizScreen">
    <div class="quiz-header">
      <button class="quiz-back" onclick="goHome()">←</button>
      <div class="quiz-level-name" id="quizLevelName"></div>
      <div class="quiz-progress-text" id="quizProgressText"></div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
    <div id="questionArea"></div>
    <button class="submit-btn" id="submitBtn" disabled onclick="submitAnswer()">确认提交</button>
    <div class="answer-feedback" id="answerFeedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="container">
  <div class="result-screen" id="resultScreen">
    <div class="result-card" id="resultCard"></div>
    <div class="result-actions">
      <button class="btn-primary" id="resultNextBtn" onclick="goToNextLevel()">继续下一关 →</button>
      <button class="btn-secondary" onclick="goHome()">返回首页</button>
    </div>
  </div>
</div>

<!-- Wrong answer modal -->
<div class="modal-overlay" id="wrongModal">
  <div class="modal-content">
    <div class="modal-title">📖 错题回顾</div>
    <div id="wrongBookContent"></div>
    <button class="modal-close" onclick="closeModal('wrongModal')">关闭</button>
  </div>
</div>

<script>
// ===== WEBHOOK CONFIG =====
// 填入群机器人的 Webhook 地址和密钥后，通关成绩会自动发送到群
const WEBHOOK_URL = 'YOUR_WEBHOOK_URL';
const WEBHOOK_SECRET = 'YOUR_WEBHOOK_SECRET';

// ===== QUESTIONS DATA =====
const ALL_QUESTIONS = QUESTIONS_PLACEHOLDER;

// ===== LEVEL CONFIG =====
const LEVELS = [
  {id:1,name:'新手村',desc:'入门基础知识',icon:'🌱',qCount:10,pass:7,diff:['简单']},
  {id:2,name:'青铜试炼',desc:'基础能力检验',icon:'🥉',qCount:10,pass:7,diff:['简单','一般']},
  {id:3,name:'白银征途',desc:'进阶知识挑战',icon:'🥈',qCount:10,pass:8,diff:['一般']},
  {id:4,name:'黄金巅峰',desc:'高手过招',icon:'🥇',qCount:10,pass:8,diff:['一般','难']},
  {id:5,name:'钻石传说',desc:'精英级挑战',icon:'💎',qCount:10,pass:9,diff:['难']},
  {id:6,name:'王者之巅',desc:'全难度终极考验',icon:'👑',qCount:15,pass:13,diff:['简单','一般','难']}
];

const MEDALS = [
  {id:'newbie',name:'新手勋章',icon:'🌱',levelId:1,desc:'完成新手村'},
  {id:'bronze',name:'青铜勋章',icon:'🥉',levelId:2,desc:'通过青铜试炼'},
  {id:'silver',name:'白银勋章',icon:'🥈',levelId:3,desc:'通过白银征途'},
  {id:'gold',name:'黄金勋章',icon:'🥇',levelId:4,desc:'通过黄金巅峰'},
  {id:'diamond',name:'钻石勋章',icon:'💎',levelId:5,desc:'通过钻石传说'},
  {id:'king',name:'王者勋章',icon:'👑',levelId:6,desc:'登顶王者之巅'},
  {id:'perfect',name:'满分勋章',icon:'💯',levelId:0,desc:'任意关卡满分'},
  {id:'streak3',name:'三连胜',icon:'🔥',levelId:0,desc:'连续通关3关'}
];

// ===== STATE =====
let state = loadState();
let currentUser = null;
let currentLevel = null;
let currentQuestions = [];
let currentIndex = 0;
let currentCorrect = 0;
let selectedAnswers = [];
let answered = false;
let isFreeMode = false;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('quiz_dd_v4'));
    if (s && s.version === 4) return s;
  } catch(e) {}
  return {version:4,clearedLevels:{},medals:[],wrongBook:[],totalCorrect:0,streak:0};
}
function saveState() { localStorage.setItem('quiz_dd_v4', JSON.stringify(state)); }

// ===== PARTICLES =====
function createParticles() {
  const c = document.getElementById('particles');
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(8+Math.random()*12)+'s';
    p.style.animationDelay=Math.random()*10+'s';
    p.style.width=p.style.height=(2+Math.random()*4)+'px';
    c.appendChild(p);
  }
}

// ===== TOAST =====
function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show '+type;setTimeout(()=>t.className='toast',2500);
}

// ===== DINGTALK AUTO FILL NAME =====
function tryDingTalkAutoFill() {
  const isDD = /DingTalk/i.test(navigator.userAgent);
  if (!isDD || typeof dd === 'undefined') return;

  try {
    dd.ready(function(){
      dd.biz.user.get({
        onSuccess: function(result){
          if (result && result.nickName) {
            document.getElementById('nameInput').value = result.nickName;
            const info = document.getElementById('ddInfo');
            info.textContent = '✅ 已识别钉钉身份：' + result.nickName;
            info.style.display = 'block';
          }
        },
        onFail: function(){ /* 静默失败，用户手动输入 */ }
      });
    });
  } catch(e) { /* 静默 */ }
}

// ===== LOGIN =====
function doLogin() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('请输入姓名','error'); return; }
  currentUser = {name: name};
  localStorage.setItem('quiz_dd_user_v4', JSON.stringify(currentUser));
  enterGame();
}

function enterGame() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('homeScreen').style.display = 'flex';
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);
  document.getElementById('userName').textContent = currentUser.name;
  renderHome();
}

// ===== WEBHOOK: 发送群消息（前端直接调用，无需服务器） =====
async function sendWebhookMessage(text) {
  if (!WEBHOOK_URL || WEBHOOK_URL === 'YOUR_WEBHOOK_URL') return;

  let url = WEBHOOK_URL;

  // 如果有加签密钥，计算签名
  if (WEBHOOK_SECRET && WEBHOOK_SECRET !== 'YOUR_WEBHOOK_SECRET') {
    const timestamp = Date.now();
    const stringToSign = timestamp + '\n' + WEBHOOK_SECRET;

    // 使用 Web Crypto API 计算 HMAC-SHA256
    const encoder = new TextEncoder();
    const keyData = encoder.encode(WEBHOOK_SECRET);
    const msgData = encoder.encode(stringToSign);

    const key = await crypto.subtle.importKey(
      'raw', keyData, {name:'HMAC', hash:'SHA-256'}, false, ['sign']
    );
    const signature = await crypto.subtle.sign('HMAC', key, msgData);

    // Base64 编码
    const base64Sig = btoa(String.fromCharCode(...new Uint8Array(signature)));
    const encodedSig = encodeURIComponent(base64Sig);

    url += '&timestamp=' + timestamp + '&sign=' + encodedSig;
  }

  const payload = {
    msgtype: 'markdown',
    markdown: { title: '🏆 闯关战报', text: text }
  };

  try {
    await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
  } catch(e) {
    console.log('Webhook发送失败:', e);
  }
}

// ===== 通关后发送战报 =====
function reportPass(levelName, score, total, stars, medalName) {
  const name = currentUser ? currentUser.name : '未知';
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  const pct = total > 0 ? Math.round(score / total * 100) : 0;
  const medalStr = medalName ? '，获得【' + medalName + '】' : '';
  const now = new Date();
  const timeStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');

  const text = '### 🏆 闯关战报\n\n' +
    '**' + name + '** 挑战【' + levelName + '】\n\n' +
    '📊 成绩：' + score + '/' + total + '（' + starStr + '）\n\n' +
    '🎯 正确率：' + pct + '%' + medalStr + '\n\n' +
    '⏰ ' + timeStr;

  sendWebhookMessage(text);
}

// ===== HOME =====
function renderHome() {
  document.getElementById('totalCorrect').textContent = state.totalCorrect;
  document.getElementById('totalLevels').textContent = Object.keys(state.clearedLevels).length;
  document.getElementById('totalMedals').textContent = state.medals.length;

  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach((level, idx) => {
    const cleared = state.clearedLevels[level.id];
    const prevCleared = idx === 0 || state.clearedLevels[LEVELS[idx-1].id];
    const locked = !prevCleared;
    const card = document.createElement('div');
    card.className = 'level-card' + (locked?' locked':'') + (cleared?' cleared':'');
    const progress = cleared ? 100 : 0;
    const bestScore = cleared ? cleared.bestScore : 0;
    const stars = cleared ? cleared.bestStars : 0;
    const starStr = cleared ? '⭐'.repeat(stars)+'☆'.repeat(3-stars) : '';
    card.innerHTML = `
      <div class="level-header">
        <span class="level-num">${locked?'🔒':'第'+level.id+'关'}</span>
        <span class="level-badge">${level.icon}</span>
      </div>
      <div class="level-name">${level.name}</div>
      <div class="level-desc">${level.desc}${locked?'':' · '+level.qCount+'题'}</div>
      <div class="level-progress"><div class="level-progress-fill" style="width:${progress}%"></div></div>
      <div class="level-status">${cleared?starStr+' '+bestScore+'/'+level.qCount:(locked?'通关上一关解锁':'未通关')}</div>`;
    if (!locked) card.onclick = () => startLevel(level.id);
    grid.appendChild(card);
  });

  const medalGrid = document.getElementById('medalGrid');
  medalGrid.innerHTML = '';
  MEDALS.forEach(medal => {
    const earned = state.medals.includes(medal.id);
    const item = document.createElement('div');
    item.className = 'medal-item' + (earned?' earned':' locked');
    item.innerHTML = '<div class="medal-icon">'+medal.icon+'</div><div class="medal-name">'+medal.name+'</div>';
    medalGrid.appendChild(item);
  });
}

// ===== START LEVEL =====
function startLevel(levelId) {
  const level = LEVELS.find(l => l.id === levelId);
  if (!level) return;
  currentLevel = level;
  isFreeMode = false;
  let pool = ALL_QUESTIONS.filter(q => level.diff.includes(q.difficulty));
  pool = shuffleArray([...pool]);
  currentQuestions = pool.slice(0, level.qCount);
  if (currentQuestions.length < level.qCount) currentQuestions = pool;
  currentIndex = 0; currentCorrect = 0;

  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('quizLevelName').textContent = level.icon + ' ' + level.name;
  renderQuestion();
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  document.getElementById('quizProgressText').textContent = (currentIndex+1)+'/'+total;
  document.getElementById('quizProgressFill').style.width = ((currentIndex+1)/total*100)+'%';

  const diffClass = q.difficulty==='简单'?'diff-easy':(q.difficulty==='一般'?'diff-normal':'diff-hard');
  const typeLabel = q.type==='判断题'?'判断题':(q.answers.length>1?'多选题':'单选题');
  const letters = ['A','B','C','D','E','F','G','H','I','J'];
  let optHtml = '';
  q.options.forEach((opt,idx) => {
    optHtml += '<div class="option-item" data-idx="'+idx+'" onclick="selectOption('+idx+')"><div class="option-letter">'+letters[idx]+'</div><div class="option-text">'+opt+'</div></div>';
  });

  document.getElementById('questionArea').innerHTML =
    '<div class="question-card fade-in"><div class="question-meta"><span class="q-tag type">'+typeLabel+'</span><span class="q-tag '+diffClass+'">'+q.difficulty+'</span><span class="q-tag type">'+q.version+'</span></div><div class="question-text">'+q.question+'</div></div><div class="options-list" id="optionsList">'+optHtml+'</div>';

  selectedAnswers = []; answered = false;
  document.getElementById('submitBtn').style.display = 'block';
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('answerFeedback').style.display = 'none';
}

function selectOption(idx) {
  if (answered) return;
  const q = currentQuestions[currentIndex];
  if (q.answers.length > 1) {
    const pos = selectedAnswers.indexOf(idx);
    if (pos >= 0) selectedAnswers.splice(pos,1); else selectedAnswers.push(idx);
  } else { selectedAnswers = [idx]; }
  document.querySelectorAll('.option-item').forEach(el => {
    el.classList.remove('selected');
    if (selectedAnswers.includes(parseInt(el.dataset.idx))) el.classList.add('selected');
  });
  document.getElementById('submitBtn').disabled = selectedAnswers.length === 0;
}

function submitAnswer() {
  if (answered || selectedAnswers.length === 0) return;
  answered = true;
  const q = currentQuestions[currentIndex];
  const correct = q.answers;
  const isCorrect = arraysEqual([...selectedAnswers].sort(), [...correct].sort());
  if (isCorrect) { currentCorrect++; state.totalCorrect++; }
  else addToWrongBook(q.id);

  document.querySelectorAll('.option-item').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.classList.remove('selected');
    if (correct.includes(idx)) el.classList.add(isCorrect&&selectedAnswers.includes(idx)?'correct':'show-correct');
    else if (selectedAnswers.includes(idx)) el.classList.add('wrong');
  });

  const fb = document.getElementById('answerFeedback'); fb.style.display = 'block';
  if (isCorrect) { fb.className='answer-feedback correct'; fb.innerHTML='✅ 回答正确！'+(q.explanation?'<br>💡 '+q.explanation:''); }
  else {
    fb.className='answer-feedback wrong';
    const cl=correct.map(i=>['A','B','C','D','E','F','G','H','I','J'][i]).join('、');
    fb.innerHTML='❌ 回答错误，正确答案是 '+cl+(q.explanation?'<br>💡 '+q.explanation:'');
  }
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('nextBtn').textContent = currentIndex<currentQuestions.length-1?'下一题 →':'查看结果 →';
  if (!isCorrect) {
    document.getElementById('questionArea').classList.add('shake');
    setTimeout(()=>document.getElementById('questionArea').classList.remove('shake'),500);
  }
  saveState();
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) showResult(); else renderQuestion();
}

// ===== RESULT =====
function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  const total = currentQuestions.length, score = currentCorrect;
  const pct = Math.round(score/total*100);
  const passed = !isFreeMode && score >= currentLevel.pass;
  let stars = 0;
  if (pct>=60) stars=1; if (pct>=80) stars=2; if (pct===100) stars=3;

  let icon,title,subtitle,medalName='';
  if (isFreeMode) { icon=pct>=80?'🎉':'📝'; title=pct>=80?'练习完成！':'继续加油！'; subtitle='自由练习模式'; }
  else if (passed) {
    icon=stars===3?'🏆':'🎉'; title=stars===3?'完美通关！':'恭喜通关！';
    subtitle=currentLevel.name+' 挑战成功';
    const prev=state.clearedLevels[currentLevel.id];
    if(!prev||prev.bestScore<score) state.clearedLevels[currentLevel.id]={bestScore:score,totalAttempts:(prev?prev.totalAttempts:0)+1,bestStars:Math.max(stars,prev?prev.bestStars:0)};
    else state.clearedLevels[currentLevel.id].totalAttempts++;
    const medal=MEDALS.find(m=>m.levelId===currentLevel.id);
    if(medal&&!state.medals.includes(medal.id)){state.medals.push(medal.id);medalName=medal.name;}
    if(stars===3&&!state.medals.includes('perfect')) state.medals.push('perfect');
    state.streak++;
    if(state.streak>=3&&!state.medals.includes('streak3')) state.medals.push('streak3');
    saveState();
    // 发送战报到群
    reportPass(currentLevel.name, score, total, stars, medalName);
    if(stars>=2) createConfetti();
  } else {
    icon='💪'; title='未通过，再试一次！';
    subtitle=currentLevel.name+' 需要答对 '+currentLevel.pass+' 题';
    state.streak=0; saveState();
  }

  const starStr='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  const medalHtml=passed&&!isFreeMode&&medalName?(()=>{const m=MEDALS.find(x=>x.name===medalName);return m?'<div class="result-medal">'+m.icon+' 获得'+m.name+'</div>':'';})():'';

  document.getElementById('resultCard').innerHTML=
    '<div class="result-icon">'+icon+'</div><div class="result-title">'+title+'</div><div class="result-subtitle">'+subtitle+'</div><div class="result-stars">'+starStr+'</div><div class="result-stats"><div class="result-stat"><div class="result-stat-value">'+score+'</div><div class="result-stat-label">答对</div></div><div class="result-stat"><div class="result-stat-value">'+(total-score)+'</div><div class="result-stat-label">答错</div></div><div class="result-stat"><div class="result-stat-value">'+pct+'%</div><div class="result-stat-label">正确率</div></div></div>'+medalHtml;

  const nb=document.getElementById('resultNextBtn');
  const nl=LEVELS.find(l=>l.id===(currentLevel?currentLevel.id+1:1));
  if(passed&&nl){nb.style.display='block';nb.textContent='挑战 '+nl.name+' →';nb.onclick=()=>startLevel(nl.id);}
  else if(!passed&&!isFreeMode){nb.style.display='block';nb.textContent='重新挑战';nb.onclick=()=>startLevel(currentLevel.id);}
  else nb.style.display='none';
}

function goHome(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('homeScreen').style.display='flex';
  renderHome();
}

function goToNextLevel(){
  if(!currentLevel)return goHome();
  const n=LEVELS.find(l=>l.id===currentLevel.id+1);
  if(n)startLevel(n.id);else startLevel(currentLevel.id);
}

// ===== WRONG BOOK =====
function addToWrongBook(qid){
  const ex=state.wrongBook.find(w=>w.questionId===qid);
  if(ex){ex.wrongCount++;ex.lastWrong=Date.now();}
  else state.wrongBook.push({questionId:qid,wrongCount:1,lastWrong:Date.now()});
  saveState();
}
function showWrongBook(){
  const c=document.getElementById('wrongBookContent');
  if(state.wrongBook.length===0){c.innerHTML='<p style="text-align:center;color:var(--text-sec);padding:20px;">🎉 暂无错题！</p>';}
  else{
    const sorted=[...state.wrongBook].sort((a,b)=>b.wrongCount-a.wrongCount);
    let h='<div style="margin-bottom:12px"><button onclick="startFreePractice()" style="width:100%;padding:10px;font-size:14px;background:var(--primary);border:none;border-radius:10px;color:#fff;cursor:pointer;">🎯 错题专项练习</button></div><div style="max-height:400px;overflow-y:auto">';
    sorted.slice(0,30).forEach(w=>{const q=ALL_QUESTIONS.find(x=>x.id===w.questionId);if(q)h+='<div style="background:var(--bg-card2);border-radius:10px;padding:12px;margin-bottom:8px"><div style="font-size:12px;color:var(--text-sec);margin-bottom:4px">'+q.version+' · '+q.difficulty+' · 错'+w.wrongCount+'次</div><div style="font-size:13px;line-height:1.5">'+q.question+'</div></div>';});
    h+='</div><button onclick="clearWrongBook()" style="width:100%;padding:8px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-sec);font-size:12px;cursor:pointer;margin-top:8px">清空错题本</button>';
    c.innerHTML=h;
  }
  document.getElementById('wrongModal').classList.add('show');
}
function startFreePractice(){
  closeModal('wrongModal');isFreeMode=true;
  currentLevel={id:0,name:'错题练习',icon:'📖',qCount:10,pass:0,diff:[]};
  const wids=state.wrongBook.map(w=>w.questionId);
  let pool=ALL_QUESTIONS.filter(q=>wids.includes(q.id));
  pool=shuffleArray([...pool]);currentQuestions=pool.slice(0,10);
  if(!currentQuestions.length){showToast('暂无错题！','success');return;}
  currentIndex=0;currentCorrect=0;
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('quizLevelName').textContent='📖 错题练习';
  renderQuestion();
}
function clearWrongBook(){if(confirm('确定清空错题？')){state.wrongBook=[];saveState();showWrongBook();}}
function closeModal(id){document.getElementById(id).classList.remove('show');}

// ===== CONFETTI =====
function createConfetti(){
  const c=document.createElement('div');c.className='confetti-container';document.body.appendChild(c);
  const colors=['#FF6B6B','#4ECDC4','#45B7D1','#FED766','#FF8E53','#A78BFA','#34D399'];
  for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=Math.random()+'s';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';c.appendChild(p);}
  setTimeout(()=>c.remove(),5000);
}

function resetProgress(){
  if(confirm('确定重置所有进度？')){state={version:4,clearedLevels:{},medals:[],wrongBook:[],totalCorrect:0,streak:0};saveState();renderHome();showToast('已重置','success');}
}

function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function arraysEqual(a,b){if(a.length!==b.length)return false;for(let i=0;i<a.length;i++)if(a[i]!==b[i])return false;return true;}

createParticles();
