
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
<title>客如云销售知识闯关</title>
<script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#6366F1;--primary-light:#A5B4FC;--primary-dark:#4338CA;--gold:#FBBF24;--gold-light:#FDE68A;--success:#22C55E;--danger:#EF4444;--bg:#0B1120;--bg2:#131B2E;--card:#1A2332;--card2:#243044;--text:#F1F5F9;--text2:#64748B;--border:#2D3F56}
html,body{overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}

/* ===== Starfield ===== */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}

/* ===== Layout ===== */
.screen{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));min-height:100vh;min-height:100dvh;display:none;flex-direction:column}
.screen.active{display:flex}

/* ===== Splash / Auto Auth ===== */
.splash{justify-content:center;align-items:center;text-align:center;gap:8px}
.splash-icon{font-size:72px;animation:bounce 2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.splash-title{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff,var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-sub{color:var(--text2);font-size:14px;margin-bottom:32px}
.auth-spinner{width:48px;height:48px;border:3px solid var(--card2);border-top-color:var(--primary-light);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-status{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:14px;margin-bottom:16px;transition:all .3s}
.auth-status .dot{width:10px;height:10px;border-radius:50%;background:var(--text2);flex-shrink:0;transition:all .3s}
.auth-status.ok .dot{background:var(--success);box-shadow:0 0 8px rgba(34,197,94,.5)}
.auth-status.ok{color:var(--success);font-weight:600;font-size:16px}
.auth-status.err .dot{background:var(--danger)}
.auth-status.err{color:var(--danger)}
.auth-hint{color:var(--text2);font-size:12px;margin-top:8px}
/* Fallback for non-DD */
.fallback-box{display:none;flex-direction:column;align-items:center;gap:10px;width:100%}
.fallback-box.show{display:flex}
.name-input{width:280px;padding:14px 20px;background:var(--card);border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:17px;text-align:center;outline:none;transition:border .2s}
.name-input:focus{border-color:var(--primary)}
.start-btn{width:280px;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform .15s}
.start-btn:active{transform:scale(.96)}
.start-btn:disabled{opacity:.4;cursor:not-allowed}

/* ===== Home ===== */
.home-user{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(135deg,var(--card),rgba(99,102,241,.08));border:1px solid var(--border);border-radius:16px;margin-bottom:20px}
.home-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
.home-uname{font-size:16px;font-weight:700}
.home-uid{font-size:12px;color:var(--text2)}
.home-xp-bar{margin-top:6px;height:6px;background:var(--card2);border-radius:3px;overflow:hidden;width:100%}
.home-xp-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:3px;transition:width .6s}

.home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.hs-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}
.hs-val{font-size:20px;font-weight:800;color:var(--gold)}
.hs-lbl{font-size:10px;color:var(--text2);margin-top:2px}

.sec-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sec-title i{width:3px;height:14px;background:var(--primary);border-radius:2px;display:inline-block}

/* Level path */
.level-path{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.lv-node{display:flex;gap:14px;align-items:stretch;cursor:pointer;transition:transform .2s}
.lv-node:active{transform:scale(.98)}
.lv-node.locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.lv-node.locked .lv-badge{background:var(--card2);color:var(--text2)}
.lv-connector{display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0}
.lv-badge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid var(--border)}
.lv-node.cleared .lv-badge{border-color:var(--success);box-shadow:0 0 12px rgba(34,197,94,.3)}
.lv-line{width:2px;flex:1;background:var(--border);margin:4px 0}
.lv-node.cleared .lv-line{background:var(--success)}
.lv-body{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:border .2s}
.lv-node.cleared .lv-body{border-color:rgba(34,197,94,.3)}
.lv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.lv-name{font-size:15px;font-weight:700}
.lv-stars{font-size:14px;letter-spacing:1px}
.lv-desc{font-size:12px;color:var(--text2);margin-bottom:8px}
.lv-bar{height:4px;background:var(--card2);border-radius:2px;overflow:hidden}
.lv-bar-fill{height:100%;border-radius:2px;transition:width .5s;background:var(--primary)}
.lv-node.cleared .lv-bar-fill{background:var(--success)}
.lv-meta{font-size:11px;color:var(--text2);margin-top:6px;text-align:right}

/* Medal shelf */
.medal-shelf{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.medal-slot{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center;transition:all .3s}
.medal-slot.earned{border-color:var(--gold);background:linear-gradient(135deg,var(--card),rgba(251,191,36,.06))}
.medal-slot.dim{opacity:.35;filter:grayscale(.8)}
.medal-ico{font-size:26px}
.medal-nm{font-size:10px;color:var(--text2);margin-top:2px}
.medal-slot.earned .medal-nm{color:var(--gold)}

.home-btns{display:flex;flex-direction:column;gap:8px;margin-top:auto}
.hbtn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s}
.hbtn:active{transform:scale(.97)}
.hbtn-primary{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff}
.hbtn-ghost{background:var(--card);border:1px solid var(--border);color:var(--text)}

/* ===== Quiz ===== */
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.quiz-back{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px}
.quiz-title{flex:1;font-size:16px;font-weight:700}
.quiz-count{font-size:13px;color:var(--text2)}
.pbar{height:6px;background:var(--card2);border-radius:3px;margin-bottom:20px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:3px;transition:width .4s}

/* Combo */
.combo-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;min-height:28px}
.combo-text{font-size:13px;font-weight:700;color:var(--gold);animation:comboPop .3s ease}
@keyframes comboPop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}

/* Question */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.q-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qtag{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.qtag-t{background:rgba(99,102,241,.15);color:var(--primary-light)}
.qtag-d1{background:rgba(34,197,94,.15);color:#4ADE80}
.qtag-d2{background:rgba(251,191,36,.15);color:#FBBF24}
.qtag-d3{background:rgba(239,68,68,.15);color:#F87171}
.qtext{font-size:16px;font-weight:600;line-height:1.65}

.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.opt{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:all .2s;-webkit-user-select:none;user-select:none}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--primary);background:rgba(99,102,241,.08)}
.opt.right{border-color:var(--success);background:rgba(34,197,94,.08)}
.opt.wrong{border-color:var(--danger);background:rgba(239,68,68,.08)}
.opt.show-right{border-color:var(--success);background:rgba(34,197,94,.08)}
.opt-letter{width:26px;height:26px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:all .2s}
.opt.sel .opt-letter{background:var(--primary);color:#fff}
.opt.right .opt-letter,.opt.show-right .opt-letter{background:var(--success);color:#fff}
.opt.wrong .opt-letter{background:var(--danger);color:#fff}
.opt-text{font-size:14px;line-height:1.55;padding-top:3px}

.q-actions{display:flex;flex-direction:column;gap:10px}
.q-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.q-btn:active{transform:scale(.97)}
.q-btn-primary{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff}
.q-btn-primary:disabled{opacity:.35;cursor:not-allowed}
.q-btn-next{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;display:none}

.q-feedback{display:none;padding:14px 16px;border-radius:14px;margin-bottom:12px;font-size:14px;line-height:1.6}
.q-feedback.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ADE80}
.q-feedback.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#F87171}

/* ===== Result ===== */
.result-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;gap:16px}
.res-icon{font-size:72px;animation:resBounce .7s ease}
@keyframes resBounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.res-title{font-size:24px;font-weight:800}
.res-sub{font-size:14px;color:var(--text2)}
.res-stars{font-size:36px;letter-spacing:6px}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
.res-cell{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 8px}
.res-cell-val{font-size:22px;font-weight:800;color:var(--gold)}
.res-cell-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.res-medal{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:20px;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.05));border:1px solid rgba(251,191,36,.25);color:var(--gold);font-size:14px;font-weight:600;animation:medalGlow 2s ease infinite alternate}
@keyframes medalGlow{0%{box-shadow:0 0 0 rgba(251,191,36,0)}100%{box-shadow:0 0 20px rgba(251,191,36,.2)}}
.res-btns{display:flex;flex-direction:column;gap:10px;width:100%}

/* ===== Confetti ===== */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.conf{position:absolute;top:-20px;animation:confDrop linear forwards}
@keyframes confDrop{0%{transform:translateY(0) rotateZ(0) rotateX(0);opacity:1}100%{transform:translateY(105vh) rotateZ(720deg) rotateX(360deg);opacity:0}}

/* ===== Modal ===== */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-mask.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto}
.modal-ttl{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-close{width:100%;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;cursor:pointer;margin-top:16px}

/* ===== Toast ===== */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:12px;font-size:13px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--success);color:#4ADE80}
.toast.err{border-color:var(--danger);color:#F87171}

/* ===== Anim ===== */
.fade-up{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.shake{animation:shake .45s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>

<!-- =============== SPLASH (Auto Auth) =============== -->
<div class="screen splash active" id="splashScreen">
  <div class="splash-icon">🏆</div>
  <div class="splash-title">客如云知识闯关</div>
  <div class="splash-sub">销售精英修炼之路</div>

  <!-- 钉钉内：自动授权 -->
  <div id="autoAuthUI">
    <div class="auth-spinner" id="authSpinner"></div>
    <div class="auth-status" id="authStatus"><span class="dot"></span><span id="authText">正在获取钉钉身份...</span></div>
    <div class="auth-hint">授权后自动进入闯关</div>
  </div>

  <!-- 非钉钉：手动输入兜底 -->
  <div class="fallback-box" id="fallbackUI">
    <div class="auth-hint" style="margin-bottom:4px">非钉钉环境，请手动输入姓名</div>
    <input class="name-input" id="nameInput" type="text" placeholder="请输入你的姓名" maxlength="10" autocomplete="off">
    <button class="start-btn" id="startBtn" onclick="doManualLogin()" disabled>开始闯关 →</button>
  </div>
</div>

<!-- =============== HOME =============== -->
<div class="screen" id="homeScreen">
  <div class="home-user">
    <div class="home-avatar" id="hAvatar">?</div>
    <div style="flex:1;min-width:0">
      <div class="home-uname" id="hName">-</div>
      <div class="home-uid" id="hId">Lv.1 新手销售</div>
      <div class="home-xp-bar"><div class="home-xp-fill" id="hXpFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="home-stats">
    <div class="hs-item"><div class="hs-val" id="sTotal">0</div><div class="hs-lbl">答对总数</div></div>
    <div class="hs-item"><div class="hs-val" id="sCleared">0</div><div class="hs-lbl">已通关</div></div>
    <div class="hs-item"><div class="hs-val" id="sMedals">0</div><div class="hs-lbl">勋章</div></div>
    <div class="hs-item"><div class="hs-val" id="sCombo">0</div><div class="hs-lbl">最高连击</div></div>
  </div>

  <div class="sec-title"><i></i>闯关地图</div>
  <div class="level-path" id="levelPath"></div>

  <div class="sec-title"><i></i>勋章收藏</div>
  <div class="medal-shelf" id="medalShelf"></div>

  <div class="home-btns">
    <button class="hbtn hbtn-primary" onclick="showWrongBook()">📖 错题回顾</button>
    <button class="hbtn hbtn-ghost" onclick="resetAll()">重置进度</button>
  </div>
</div>

<!-- =============== QUIZ =============== -->
<div class="screen" id="quizScreen">
  <div class="quiz-top">
    <button class="quiz-back" onclick="goHome()">←</button>
    <div class="quiz-title" id="qzTitle">-</div>
    <div class="quiz-count" id="qzCount">-</div>
  </div>
  <div class="pbar"><div class="pbar-fill" id="qzPbar"></div></div>
  <div class="combo-bar" id="comboBar"></div>
  <div id="qArea"></div>
  <div class="q-actions">
    <button class="q-btn q-btn-primary" id="submitBtn" disabled onclick="doSubmit()">确认提交</button>
    <button class="q-btn q-btn-next" id="nextBtn" onclick="doNext()">下一题 →</button>
  </div>
  <div class="q-feedback" id="qFeedback"></div>
</div>

<!-- =============== RESULT =============== -->
<div class="screen" id="resultScreen">
  <div class="result-wrap" id="resultWrap"></div>
</div>

<!-- ===== Wrong book modal ===== -->
<div class="modal-mask" id="wrongModal">
  <div class="modal-box">
    <div class="modal-ttl">📖 错题回顾</div>
    <div id="wrongContent"></div>
    <button class="modal-close" onclick="closeModal('wrongModal')">关闭</button>
  </div>
</div>

<script>
// ===================== CONFIG =====================

OS","type":"单选题","q":"关于如何导出寄存明细表，说法正确的是？","opts":["A、因无寄存明细表，所以寄存明细无法进行导出，只能人工进行查看记录。","B、因无寄存明细 表，但可以提交AONE工单产研协助导出。","C、寄存明细可以商户自助导出，但是必须要有合约才行。","D、寄存明细可以商户自助导出，没有合约也支持导出。"],"ans":[3],"exp":"326","difficulty":"一般"},{"id":505,"ver":"KPOS","type":"单选题","q":"小程序先付在下单，结账的时候提示：“请联系服务员，在pos上下单支付”，以下说法正确的是？","opts":["A、商户设置了不允许在线付款导致，引导去POS端进行下单付款。","B、一般情况下，由于唤起收银台后，直接退出，导致订单状态一直是支付中，需要等3分钟超时自动关单后，才能再小程序继续支付","C、一个桌位多个顾客同时下单导致。","D、支付进件未绑定小程序APPID导致"],"ans":[1],"exp":"327","difficulty":"简单"},{"id":506,"ver":"KPOS","type":"多选题","q":"pos端会员登录输入手机号码后4位数无法搜索到会员，输入完整的手机号码可以搜索登录，主要原因是什么？","opts":["A、客如云登录界面不支持输入手机号码后4位登录。","B、商户设置为当前门店不可查看其它门店会员和顾客信息，但可以搜索其它门店会员和顾客信息，那么输入手机号码后4位就无法查询，但是输入完整手机号码就可以正常查询到。","C、手机号码后4位一样的会员号码量级大于10个，那么就会导致部分会员输入后4位无法查询不到。","D、客如云结账界面不支持输入手机号码后4位，必须输入完整手机号码。"],"ans":[1,2],"exp":"259、328","difficulty":"难"},{"id":507,"ver":"KPOS","type":"判断题","q":"小程序端购买付费权益卡提示：“下单失败，请稍后再试”。可能原因是因为支付进件未绑定微信小程序APPID导致。以上说法是否正确？","opts":["A、正确","B、错误"],"ans":[0],"exp":"329","difficulty":"简单"},{"id":508,"ver":"KPOS","type":"判断题","q":"套餐立省标签计算规则，是以套餐内最高的子菜商品原价累计以后-套餐价钱进行计算显示最多立省金额展示。以上说法是否正确？","opts":["A、正确","B、错误"],"ans":[0],"exp":"330","difficulty":"一般"},{"id":509,"ver":"ONPOS","type":"判断题","q":"ONPOS商户，ERP系统修改商户信息保存提示：“部门名称重复”无法成功，主要的原因是客如云侧已经存在此店名导致。以上说法是否正确？","opts":["A、正确","B、错误"],"ans":[0],"exp":"331","difficulty":"一般"},{"id":510,"ver":"KPOS","type":"多选题","q":"设置弹窗广告的时候无法选择门店信息，以下可能原因正确的是？","opts":["A、弹窗广告无需选择门店，广告是品牌维度设置。","B、没有手机点餐合约导致","C、没有会员营销合约导致。","D、员工没有管理门店权限。"],"ans":[1,3],"exp":"332","difficulty":"简单"},{"id":511,"ver":"KPOS","type":"判断题","q":"小程序端积分兑换提示：“支付失败，请稍后再试”，可能原因是因为支付进件未绑定微信小程序APPID导致。以上说法是否正确？","opts":["A、正确","B、错误"],"ans":[0],"exp":"333","difficulty":"简单"},{"id":512,"ver":"KPOS","type":"多选题","q":"小程序首页，推荐商品商品单位显示未“null”，以下说法正确的是？","opts":["A、问题原因是OnPOS上翻KPOS的商户，小程序通过迁移工具迁移，装修方案也一并迁移了，但是商品信息还是老的商品ID导致。","B、商品单位设置的是默认份导致。","C、解决方法：掌客 - 超管账号登录总部 - 小程序管理 - 装修 - 首页，把推荐菜组件删除，然后重新添加，并重新圈推荐菜。","D、解决方案，商品库选择商品修改商品单位解决。"],"ans":[0,2],"exp":"334","difficulty":"简单"},{"id":513,"ver":"新零售","type":"判断题","q":"新零售是否支持次卡功能？","opts":["A、支持","B、不支持"],"ans":[0],"exp":"337","difficulty":"简单"},{"id":514,"ver":"KPOS","type":"单选题","q":"抖音团购授权绑定的时候提示：“授权绑定失败，暂无权限为该商户授权服务商”，以上说法正确的是？","opts":["A、抖音团购授权绑定必须使用客如云门店账号和密码登录。","B、抖音团购授权绑定必须使用客如云品牌账号和密码登录。","C、抖音团购授权权限不足，必须使用抖音门店超管账号登录","D、抖音团购授权权限不足，必须使用抖音品牌超管账号登录"],"ans":[3],"exp":"338","difficulty":"一般"},{"id":515,"ver":"KPOS","type":"判断题","q":"为什么小程序点餐界面商品不展示优惠活动，整单级的优惠活动只会在点餐页面抬头显示，只有商品级优惠活动才能展示在单个商品页面上。以上说法是否正确？","opts":["A、正确","B、错误"],"ans":[0],"exp":"339","difficulty":"简单"},{"id":516,"ver":"KPOS","type":"多选题","q":"关于综合收款统计、储值消费汇总统计金额、会员消费金额不一致说法正确的是？","opts":["A、补录补扣金额不会统计在综合收款统计，但是会统计在储值消费汇总统计中，所以导致金额不一致。","B、储值消费汇总和会员消费金额是一样的，如果不一样可能是系统问题。","C、补录补扣金额不会统计在综合收款统计但是会统计在会员消费金额中，所以导致金额不一样","D、会员消费金额包括了储值卡余额消费金额，所以正常情况下会员消费金额会大于会员卡余额消费金额。"],"ans":[0,3],"exp":"340","difficulty":"难"},{"id":517,"ver":"KPOS","type":"多选题","q":"盲盒活动转发助力说法正确的是？","opts":["A、盲盒活动无法助力功能","B、盲盒活动支持助力功能","C、盲盒活动转发助力以后无助力按钮，只要点击进入就代表助力完成。","D、盲盒活动转发助力以后，需要点击进入以后点击助力按钮才能完成助力。"],"ans":[1,2],"exp":"341","difficulty":"难"},{"id":518,"ver":"KPOS","type":"判断题","q":"小程序装修中设置招牌菜选择商品显示为空或者显示不全， 必须设置商品图片才能进行展示，以上说法是否正确？","opts":["A、正确","B、错误"],"ans":[0],"exp":"342","difficulty":"简单"},{"id":519,"ver":"KPOS","type":"多选题","q":"以下关于客如云产品说法正确的是？","opts":["A、消费送活动，每满多少赠送优惠券。赠送优惠券上限为10张，如果不够可以申请加白提升。","B、小程序顾客评价无法回复也无法进行删除。","C、反结账操作记录，如果是跨天反结账，那么敏感操作报表无法统计。","D、菜品规格顺序排序需要去菜品库——规格管理进行排序调整"],"ans":[0,1,2,3],"exp":"343/344/346/347","difficulty":"一般"},{"id":520,"ver":"KPOS","type":"多选题","q":"关于优惠券使用规则设置说法正确的是？","opts":["A、每天每人使用多张优惠券设置代表的是所有代金券合计使用多少张，例如优惠券A和B合计只能使用2张。","B、每天每人使用多张优惠券设置代表的是每种优惠券只能使用多少张，例如优惠券A和B，A可以使用2张，B可以使用2张。","C、支持设置POS端单个订单最大使用优惠券张数。","D、支持设置小程序端单个订单最大使用优惠券张数。"],"ans":[1,2,3],"exp":"348","difficulty":"难"},{"id":521,"ver":"KPOS","type":"多选题","q":"关于交接班退款金额统计说法正确的是？","opts":["A、交接班收款金额剔除了退款金额。","B、交接班收款金额未剔除了退款金额。","C、退款金额可以单独统计","D、退款金额不能单独统计"],"ans":[1,2],"exp":"349","difficulty":"难"},{"id":522,"ver":"KPOS"," ","q":"【ONPOS】为什么微信小程序授权绑定后，掌上客如云管理界面看不到绑定信息？以下哪项是正确原因及解决方法？","opts":["A. 网络连接不稳定导致授权信息未同步","B. 授权时出现口碑CRM登录页面未登录超管账号，需重新解绑并按步骤操作（登录超管账号后授权）","C. 绑定步骤错误，需跳过口碑 CRM 界面直接授权","D. 微信小程序后台权限设置未开启"],"ans":[1],"exp":"496","difficulty":"一般"},{"id":580,"ver":"KPOS","type":"单选题","q":"在标签打印模块中设置了杯贴背景，但标签未打印。以下哪项解释正确？","opts":["A. 未正确连接打印机设备","B. 杯贴背景仅用于展示和定制打印纸样式，默认不打印","C. 系统版本过低导致功能异常","D. 未开启 “打印背景” 开关"],"ans":[1],"exp":"497","difficulty":"简单"},{"id":581,"ver":"KPOS","type":"多选题","q":"关于 CRM 合约到期后，会员储值功能关停规则，以下哪些说法正确？","opts":["A、CRM1.0商户无法关停储值功能，系统自动维持使用","B. CRM2.0 商户需加入指定钉钉群并提交关停申请表，双周统一处理","C. KPOS 商户需通过 AONE 工单关闭 POS 端自定义储值功能","D. KPOS 商户关闭储值方案需提交 AONE 工单，POS 端功能不受影响"],"ans":[0,1,3],"exp":"498","difficulty":"难"},{"id":582,"ver":"KPOS","type":"多选题","q":"储值明细表汇总的余额与储值余额汇总表不一致，可能的原因是？","opts":["A. 储值明细表统计的是时间段内的余额变动金额，而储值余额汇总表展示的是总余额，两者不可直接比对","B. 储值明细表以 “交易门店” 为维度统计，储值余额汇总表以 “充值门店” 为维度统计，维度不同","C. 系统未实时同步数据导致统计延迟","D. 储值明细表未包含所有交易类型，导致汇总数据缺失"],"ans":[0,1],"exp":"501","difficulty":"简单"},{"id":583,"ver":"KPOS","type":"单选题","q":"在客如云第三方对账报表中，补贴字段的统计逻辑是？","opts":["A. 仅统计第三方平台明确标注的补贴金额","B. 包含客如云为平账而调整的金额（因部分第三方金额未透出）","C. 仅统计商户自主设置的补贴活动","D. 实时同步第三方平台的补贴数据"],"ans":[1],"exp":"509","difficulty":"简单"},{"id":584,"ver":"KPOS","type":"多选题","q":"过渡版本小程序使用要求以下说法正确的是？","opts":["A、要具备商家版本小程序合约，并且是生效中。","B、品牌维度下存在一个门店有过渡版本小程序合约，并且需要生效中。","C、存在生效中平台小程序合约，过渡合约使用不了，需要作废平台小程序合约。","D、平台小程序切换到过渡版本小程序需要重新支付进件和更换二维码。"],"ans":[0,1,2,3],"exp":"518","difficulty":"一般"},{"id":585,"ver":"KPOS","type":"多选题","q":"收银机器打印小票就自动关机，可能是以下那些问题造成？","opts":["A、可能机器上链接的usb设备影响，可以拔掉所有的 USB 设备，以及钱箱，在尝试是否会自动关机。","B、打印内容影响，打印存在 黑底白字（也就是反显打印），可以把反显去掉","C、收银机器电源线非原装，供电不足导致。","D、可能硬件问题，尝试收银机器恢复出厂设置重置"],"ans":[0,1,2,3],"exp":"519","difficulty":"简单"},{"id":586,"ver":"KPOS","type":"多选题","q":"关于会员等级调整规则，说法正确的是？","opts":["A、手动调整会员等级，会自动补充对应会员成长值，例如：等级v1 100成长值，等级v2  200成长值   ，从v1调整成v2，系统会增加成长值到刚好满足v2等级=200成长值，从v2调整成v1，系统会减少成长值到v1等级的最低门槛=100成长值。","B、变更等级成长值，调整成长值门槛以后，会员会基于新的成长值情况进行重新计算会员等级。 例如 会员A当前成长值200，属于会员等级v2，  会员等级v1 1 // ===================== WEBHOOK =====================
async function sendReport(text){
  if(!WEBHOOK_URL||WEBHOOK_URL.includes('YOUR_'))return;
  let url=WEBHOOK_URL;
  if(WEBHOOK_SECRET&&!WEBHOOK_SECRET.includes('YOUR_')){
    const ts=Date.now(),sig=ts+'\n'+WEBHOOK_SECRET;
    try{
      const enc=new TextEncoder();
      const key=await crypto.subtle.importKey('raw',enc.encode(WEBHOOK_SECRET),{name:'HMAC',hash:'SHA-256'},false,['sign']);
      const s=await crypto.subtle.sign('HMAC',key,enc.encode(sig));
      const b64=btoa(String.fromCharCode(...new Uint8Array(s)));
      url+='&timestamp='+ts+'&sign='+encodeURIComponent(b64);
    }catch(e){console.log('Sign failed',e)}
  }
  try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msgtype:'markdown',markdown:{title:'🏆 闯关战报',text}})})}catch(e){console.log('Webhook failed',e)}
}

  });
}

function startLv(id){

  lv=l;freeMode=false;combo=0;
  let pool=QUESTIONS.filter(q=>l.diff.includes(q.difficulty));
  pool=shuffle([...pool]);
  qs=pool.slice(0,l.count);
  if(qs.length<l.count)qs=pool;
  qi=0;qc=0;
  showScreen('quizScreen');
  document.getElementById('qzTitle').textContent=l.icon+' '+l.name;
  renderQ();
}

// ===================== RENDER QUESTION =====================
function renderQ(){
  const q=qs[qi],total=qs.length;
  document.getElementById('qzCount').textContent=(qi+1)+'/'+total;
  document.getElementById('qzPbar').style.width=((qi+1)/total*100)+'%';

  // Combo
  const cb=document.getElementById('comboBar');
  cb.innerHTML=combo>=2?'<span class="combo-text">🔥 连击 ×'+combo+'</span>':'';

  const dc=q.difficulty==='简单'?'d1':(q.difficulty==='一般'?'d2':'d3');
  const tl=q.type==='判断题'?'判断题':(q.ans.length>1?'多选题':'单选题');
  const L='ABCDEFGHIJ';

  let opts='';
  q.opts.forEach((o,i)=>{
    opts+=`<div class="opt" data-i="${i}" onclick="pickOpt(${i})"><div class="opt-letter">${L[i]}</div><div class="opt-text">${o}</div></div>`;
  });

  document.getElementById('qArea').innerHTML=`
    <div class="q-card fade-up">
      <div class="q-tags"><span class="qtag qtag-t">${tl}</span><span class="qtag qtag-${dc}">${q.difficulty}</span><span class="qtag qtag-t">${q.ver}</span></div>
      <div class="qtext">${q.q}</div>
    </div>
    <div class="opts" id="optsList">${opts}</div>`;

  sel=[];done=false;
  const sb=document.getElementById('submitBtn'),nb=document.getElementById('nextBtn'),fb=document.getElementById('qFeedback');
  sb.style.display='block';sb.disabled=true;nb.style.display='none';
  fb.style.display='none';
}

function pickOpt(i){
  if(done)return;
  const q=qs[qi], multi=q.ans.length>1;
  if(multi){const p=sel.indexOf(i);if(p>=0)sel.splice(p,1);else sel.push(i);}
  else sel=[i];
  document.querySelectorAll('.opt').forEach(el=>{
    el.classList.remove('sel');
    if(sel.includes(+el.dataset.i))el.classList.add('sel');
  });
  document.getElementById('submitBtn').disabled=sel.length===0;
}

function doSubmit(){
  if(done||!sel.length)return;done=true;
  const q=qs[qi],correct=q.ans,isRight=arrEq([...sel].sort(),[...correct].sort());
  if(isRight){qc++;S.total++;combo++;if(combo>maxCombo)maxCombo=combo;if(combo>S.maxCombo)S.maxCombo=combo;}
  else{combo=0;addWrong(q.id);}

  document.querySelectorAll('.opt').forEach(el=>{
    const i=+el.dataset.i;el.classList.remove('sel');
    if(correct.includes(i))el.classList.add(isRight&&sel.includes(i)?'right':'show-right');
    else if(sel.includes(i))el.classList.add('wrong');
  });

  const fb=document.getElementById('qFeedback');fb.style.display='block';
  if(isRight){fb.className='q-feedback ok';fb.innerHTML='✅ 回答正确！'+(combo>=3?' <b>🔥'+combo+'连击!</b>':'')+(q.exp?'<br>💡 '+q.exp:'');}
  else{fb.className='q-feedback bad';const cl=correct.map(i=>'ABCDEFGHIJ'[i]).join('、');fb.innerHTML='❌ 正确答案：'+cl+(q.exp?'<br>💡 '+q.exp:'');}

  document.getElementById('submitBtn').style.display='none';
  const nb=document.getElementById('nextBtn');nb.style.display='block';
  nb.textContent=qi<qs.length-1?'下一题 →':'查看结果 →';

  if(!isRight){document.getElementById('qArea').classList.add('shake');setTimeout(()=>document.getElementById('qArea').classList.remove('shake'),450);}
  saveS();
}

function doNext(){qi++;if(qi>=qs.length)showResult();else renderQ();}

// ===================== RESULT =====================
function showResult(){
  showScreen('resultScreen');
  const total=qs.length,score=qc,pct=Math.round(score/total*100);
  const passed=!freeMode&&score>=lv.pass;
  let stars=0;if(pct>=60)stars=1;if(pct>=80)stars=2;if(pct===100)stars=3;

  let icon,title,sub,medalName='',earnedXp=0;

  if(freeMode){icon=pct>=80?'🎉':'📝';title=pct>=80?'练习完成！':'继续加油！';sub='错题练习模式';}
  else if(passed){
    icon=stars===3?'🏆':'🎉';title=stars===3?'完美通关！':'恭喜通关！';sub=lv.name+' 挑战成功';
    const prev=S.lv[lv.id];
    earnedXp=lv.xp*(stars===3?2:stars===2?1.5:1);
    S.xp+=Math.round(earnedXp);
    if(!prev||prev.best<score)S.lv[lv.id]={best:score,tries:(prev?prev.tries:0)+1,stars:Math.max(stars,prev?prev.stars:0)};
    else S.lv[lv.id].tries++;
    const medal=MEDALS.find(m=>m.lv===lv.id);
    if(medal&&!S.medals.includes(medal.id)){S.medals.push(medal.id);medalName=medal.name;}
    if(stars===3&&!S.medals.includes('m7'))S.medals.push('m7');
    S.streak++;if(S.streak>=3&&!S.medals.includes('m8'))S.medals.push('m8');
    saveS();
    reportPass(lv.name,score,total,stars,medalName,earnedXp);
    if(stars>=2)confetti();
  }else{
    icon='💪';title='未通过，再试一次！';sub=lv.name+' 需要答对'+lv.pass+'题';
    S.streak=0;saveS();
  }

  const starStr='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  const medalHtml=medalName?`<div class="res-medal">🏅 获得「${medalName}勋章」</div>`:'';
  const xpHtml=earnedXp?`<div style="font-size:14px;color:var(--gold);font-weight:600">+${Math.round(earnedXp)} XP</div>`:'';

  document.getElementById('resultWrap').innerHTML=`
    <div class="res-icon">${icon}</div>
    <div class="res-title">${title}</div>
    <div class="res-sub">${sub}</div>
    <div class="res-stars">${starStr}</div>
    <div class="res-grid">
      <div class="res-cell"><div class="res-cell-val">${score}</div><div class="res-cell-lbl">答对</div></div>
      <div class="res-cell"><div class="res-cell-val">${total-score}</div><div class="res-cell-lbl">答错</div></div>
      <div class="res-cell"><div class="res-cell-val">${pct}%</div><div class="res-cell-lbl">正确率</div></div>
    </div>
    ${xpHtml}${medalHtml}
    <div class="res-btns">
      ${passed?getNextBtnHtml():'<button class="q-btn q-btn-primary" onclick="startLv(lv.id)">重新挑战</button>'}
      <button class="q-btn q-btn-next" style="display:block;background:var(--card);border:1px solid var(--border);color:var(--text)" onclick="goHome()">返回首页</button>
    </div>`;
}

function getNextBtnHtml(){
  const nl=LEVELS.find(l=>l.id===lv.id+1);
  if(nl)return`<button class="q-btn q-btn-primary" onclick="startLv(${nl.id})">挑战 ${nl.name} →</button>`;
  return'<button class="q-btn q-btn-primary" disabled>🎊 已全部通关！</button>';
}

function reportPass(name,score,total,stars,medal,xp){
  const n=user?user.name:'未知';
  const s='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  const pct=total?Math.round(score/total*100):0;
  const ms=medal?'，获得【'+medal+'勋章】':'';
  const d=new Date(),t=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  sendReport('### 🏆 闯关战报\n\n**'+n+'** 挑战【'+name+'】\n\n📊 成绩：'+score+'/'+total+'（'+s+'）\n\n🎯 正确率：'+pct+'%'+ms+'\n\n✨ 获得：'+Math.round(xp)+' XP\n\n⏰ '+t);
}

// ===================== NAV =====================
function goHome(){showScreen('homeScreen');renderHome()}

// ===================== WRONG BOOK =====================
function addWrong(id){const e=S.wrong.find(w=>w.id===id);if(e)e.n++;else S.wrong.push({id,n:1});saveS()}
function showWrongBook(){
  const c=document.getElementById('wrongContent');
  if(!S.wrong.length){c.innerHTML='<p style="text-align:center;color:var(--text2);padding:20px">🎉 暂无错题！</p>';}
  else{
    const sorted=[...S.wrong].sort((a,b)=>b.n-a.n);
    let h='<div style="margin-bottom:12px"><button onclick="startFree()" style="width:100%;padding:12px;font-size:14px;background:var(--primary);border:none;border-radius:12px;color:#fff;cursor:pointer;font-weight:600">🎯 错题专项练习（随机10题）</button></div><div style="max-height:50vh;overflow-y:auto">';
    sorted.slice(0,30).forEach(w=>{const q=QUESTIONS.find(x=>x.id===w.id);if(q)h+='<div style="background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">'+q.ver+' · '+q.difficulty+' · 错'+w.n+'次</div><div style="font-size:13px;line-height:1.5">'+q.q+'</div></div>';});
    h+='</div><button onclick="clearWrong()" style="width:100%;padding:8px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;margin-top:8px">清空错题本</button>';
    c.innerHTML=h;
  }
  document.getElementById('wrongModal').classList.add('show');
}
function startFree(){
  closeModal('wrongModal');freeMode=true;combo=0;
  lv={id:0,name:'错题练习',icon:'📖',count:10,pass:0,diff:[]};
  const ids=S.wrong.map(w=>w.id);let pool=QUESTIONS.filter(q=>ids.includes(q.id));
  pool=shuffle([...pool]);qs=pool.slice(0,10);
  if(!qs.length){toast('暂无错题','ok');return;}
  qi=0;qc=0;showScreen('quizScreen');
  document.getElementById('qzTitle').textContent='📖 错题练习';
  renderQ();
}
function clearWrong(){if(confirm('确定清空错题？')){S.wrong=[];saveS();showWrongBook()}}
function closeModal(id){document.getElementById(id).classList.remove('show')}

// ===================== CONFETTI =====================
function confetti(){
  const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
  const colors=['#FF6B6B','#4ECDC4','#45B7D1','#FED766','#FF8E53','#A78BFA','#22C55E','#FBBF24'];
  for(let i=0;i<80;i++){const p=document.createElement('div');p.className='conf';p.style.cssText=`left:${Math.random()*100}%;background:${colors[~~(Math.random()*colors.length)]};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'3px'};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px`;c.appendChild(p);}
  setTimeout(()=>c.remove(),6000);
}

// ===================== RESET =====================
function resetAll(){if(confirm('确定重置所有进度？')){S={v:5,lv:{},medals:[],wrong:[],total:0,streak:0,maxCombo:0,xp:0};saveS();renderHome();toast('已重置','ok')}}

// ===================== UTILS =====================
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}
function arrEq(a,b){if(a.length!==b.length)return false;for(let i=0;i<a.length;i++)if(a[i]!==b[i])return false;return true}

// Enter key
document.getElementById('nameInput').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});
</script>
